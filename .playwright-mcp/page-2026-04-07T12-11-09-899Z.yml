              - text: We will discuss JMS Prioritize messages in detail with examples. The
              - code [ref=e133]: JMSPriority
              - text: header field of each message represents its priority. I have talked about prioritizing messages in
              - strong [ref=e134]: Message Model Tutorial.
            - paragraph [ref=e135]: JMS has 10 priority levels, 0 to 9. 0 is the lowest priority and 9 is the highest priority. As per the JMS standard, a message with priority 0-4 is the normal priority and 5-9 is considered as an expedited priority.
            - heading "JMS Priority example" [level=2] [ref=e136]
            - paragraph [ref=e137]: In the below example, messages with different priorities are sent to the receiver. However, the one with the highest priority (9) arrives first and similarly, the least priority arrives in the end.
