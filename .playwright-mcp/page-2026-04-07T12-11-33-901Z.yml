          - generic [ref=e131]:
            - paragraph [ref=e132]:
              - text: You will understand JMS Architecture, learn to Send and Receive a message in JMS. I will cover, Administrated Objects, JMS 1.1 API and JMS 2.0 API. We will also see how simple is JMS 2.0 API to use as compared to JMS 1.1 API. Make sure you have the JMS set up completed before proceeding with the course. If you are a beginner, make sure you have understood the
              - strong [ref=e133]:
                - link "basics of JMS (opens in a new tab)" [ref=e134] [cursor=pointer]:
                  - /url: ../../jms/jms-introduction-java-message-service/
                  - text: basics of JMS
              - text: .
            - list [ref=e135]:
              - listitem [ref=e136]:
                - text: Remember when you work in JMS, the
                - strong [ref=e137]: ConnectionFactory
                - text: and
                - strong [ref=e138]: Destination
                - text: objects (Queue and Topics) are needed to be configured in the JMS providers. This is the reason why they are known as
                - strong [ref=e139]: Administered
                - text: objects.
              - listitem [ref=e140]:
                - text: You will usually do a JNDI lookup to get a
                - strong [ref=e141]: ConnectionFactory
                - text: and then obtain a physical
                - strong [ref=e142]: Connection
                - text: object from the ConnectionFactory.
              - listitem [ref=e143]:
                - text: After obtaining a Connection, you will need to open up a
                - strong [ref=e144]: Session
                - text: to send/receive messages.
            - heading "JMS APIs Version" [level=2] [ref=e145]
            - paragraph [ref=e146]: There are basically 2 main sets of interface for sending and receiving the messages that you need to learn.
            - list [ref=e147]:
              - listitem [ref=e148]:
                - strong [ref=e149]: JMS 1.1
                - text: "- Also known as"
                - strong [ref=e150]: Classic API
                - text: ", this is the legacy API."
              - listitem [ref=e151]:
                - strong [ref=e152]: JMS 2.0
                - text: "- Known as"
                - strong [ref=e153]: Simplified API
                - text: ", offers simpler API needs fewer interfaces. This is what you need to use in new projects."
            - heading "Common interfaces" [level=3] [ref=e154]
            - list [ref=e155]:
              - listitem [ref=e156]:
                - strong [ref=e157]: Queue
                - text: "- An administered object used for point-to-point messaging. Single producer and a single receiver."
              - listitem [ref=e158]:
                - strong [ref=e159]: Topic
                - text: "- an administered object used for pub/sub messaging. Single Producer, but multiple Receiver."
              - listitem [ref=e160]:
                - strong [ref=e161]: Destination
                - text: "- The common supertype of Queue and Topic."
              - listitem [ref=e162]:
                - strong [ref=e163]: Message, ByteMessage, MapMessage, ObjectMessage, StreamMessage
                - text: and
                - strong [ref=e164]: StreamMessage
                - text: "- Represents the message’s type that is sent to or received from a JMS provider."
            - heading "Send and receive a message using JMS" [level=2] [ref=e165]
            - paragraph [ref=e166]: We will see simple examples to send and receive a text message using JMS 1.1 (classic API) and also using JMS 2.0 (simplified API). I recommend using the JMS 2.0 API, this is what will be discussed more in this tutorial. However, it is also a good idea to keep an eye on the Old API if you happen to work on a legacy application.
            - heading "Developing a client in JMS 1.1" [level=3] [ref=e167]
            - paragraph [ref=e168]: Below is a sample example that demonstrates the use of classic API. It creates a simple text message and sends it to a Queue. The same message is then read by a message consumer from the same queue.
            - generic [ref=e169]:
              - generic [ref=e170]: Java
              - button "Copy" [ref=e171] [cursor=pointer]:
                - img [ref=e172]
              - code [ref=e175]:
                - generic [ref=e176]: package lab00.classic.helloworld;
                - generic [ref=e177]: import javax.jms.*;
                - generic [ref=e178]: import javax.naming.InitialContext;
                - generic [ref=e179]: import javax.naming.NamingException;
                - generic [ref=e180]: "public class TestHelloWorldQueue {"
                - generic [ref=e181]: "public static void main(String[] args) throws NamingException {"
                - generic [ref=e182]: InitialContext initialContext = null;
                - generic [ref=e183]: "try {"
                - generic [ref=e184]: initialContext = new InitialContext();
                - generic [ref=e185]: //Step-1 Create ConnectionFactory
                - generic [ref=e186]: ConnectionFactory connectionFactory
                - generic [ref=e187]: = (ConnectionFactory) initialContext.lookup("jms/__defaultConnectionFactory");
                - generic [ref=e189]: //Step-2 Create connection
                - generic [ref=e190]: Connection connection = connectionFactory.createConnection();
                - generic [ref=e192]: //Step-3 Create Session
                - generic [ref=e193]: //Any number of sessions can be created from a connection
                - generic [ref=e194]: Session session = connection.createSession();
                - generic [ref=e195]: //Step-4 Get the Queue
                - generic [ref=e196]: Queue queue = (Queue) initialContext.lookup("jms/PTPQueue");
                - generic [ref=e197]: //Step-5a Create the message Producer
                - generic [ref=e198]: MessageProducer messageProducer = session.createProducer(queue);
                - generic [ref=e199]: //Step-6a Create the Text Message
                - generic [ref=e200]: TextMessage textMessage = session.createTextMessage("Test message - Hello");
                - generic [ref=e202]: //Step-7a Send the message
                - generic [ref=e203]: messageProducer.send(textMessage);
                - generic [ref=e204]: //Step-5b Create the message consumer
                - generic [ref=e205]: MessageConsumer messageConsumer = session.createConsumer(queue);
                - generic [ref=e206]: //Step-6b Start the connection
                - generic [ref=e207]: connection.start(); //to start delivery
                - generic [ref=e208]: //step-7b Receive the message
                - generic [ref=e209]: TextMessage message = (TextMessage) messageConsumer.receive();
                - generic [ref=e210]: System.out.println(message.getText());
                - generic [ref=e211]: "} catch (NamingException | JMSException ex) {"
                - generic [ref=e212]: ex.printStackTrace();
                - generic [ref=e213]: "} finally {"
                - generic [ref=e214]: "if (initialContext != null) {"
                - generic [ref=e215]: initialContext.close();
                - generic [ref=e216]: "}"
                - generic [ref=e217]: "}"
                - generic [ref=e218]: "}"
                - generic [ref=e219]: "}"
            - paragraph [ref=e220]: As you can see in the above code, there are several steps you need to follow to send and receive a message using JMS 1.1 (classic api). Summarizing the steps below.
            - list [ref=e221]:
              - listitem [ref=e222]:
                - text: Create the
                - code [ref=e223]: ConnectionFactory
                - text: using JNDI lookup. The JNDI information is configured in
                - code [ref=e224]: jndi.properties
                - text: file. You will need only one ConnectionFactory per applicaton/service.
              - listitem [ref=e225]:
                - text: After that, get the
                - code [ref=e226]: Connection
                - text: object from the ConnectionFactory.
              - listitem [ref=e227]:
                - text: Create a
                - code [ref=e228]: Session
                - text: from the connection.
              - listitem [ref=e229]:
                - text: Use the Session to create
                - code [ref=e230]: MessageProducer
                - text: and
                - code [ref=e231]: MessageConsumer
                - text: objects.
              - listitem [ref=e232]: Tell the Connection to start delivering the message.
              - listitem [ref=e233]:
                - text: Most importantly, remember to
                - strong [ref=e234]: close
                - text: the Session, Connection, MessageProducer, and MessageConsumer objects in a finally-block or in a
                - link "try-with-block (opens in a new tab)" [ref=e235] [cursor=pointer]:
                  - /url: https://docs.oracle.com/javase/tutorial/essential/exceptions/tryResourceClose.html
                  - text: try-with-resources
                - text: block. I have just skipped this step for brevity.
            - paragraph [ref=e236]: The below diagram represents the above steps as a flow chart.
            - figure "image credit - Oracle JMS 2.0 Specification" [ref=e237]:
              - img "JMS 1.1 flow" [ref=e238]
              - generic [ref=e239]: image credit - Oracle JMS 2.0 Specification
            - heading "Developing a client in JMS 2.0" [level=3] [ref=e240]
            - paragraph [ref=e241]: I will do the same task of sending a hello message to the Queue and reading it using a Consumer. Let us take a look at the below code. Note, the example below is only to give you an idea of JMS 2.0. Don’t code the same way in your project, in the latter part of the tutorial I will be discussing more Project appropriate code examples.
