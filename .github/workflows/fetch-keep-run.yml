name: Fetch Keep Running data

on:
  schedule:
    # 每 2 小时（与原先从 raw 拉取频率一致；可改为每日以减轻 API 压力）
    - cron: "0 */2 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: running-sync
  cancel-in-progress: true

jobs:
  sync:
    name: Fetch Keep → running.json
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: scripts/requirements-running.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements-running.txt

      - name: Generate running.json from Keep API
        env:
          KEEP_MOBILE: ${{ secrets.KEEP_MOBILE }}
          KEEP_PASSWORD: ${{ secrets.KEEP_PASSWORD }}
        run: |
          if [ -z "${KEEP_MOBILE:-}" ] || [ -z "${KEEP_PASSWORD:-}" ]; then
            echo "::error::Configure repository secrets KEEP_MOBILE and KEEP_PASSWORD (Settings → Secrets and variables → Actions)."
            exit 1
          fi
          python scripts/fetch_keep_run.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/running.json
          if git diff --staged --quiet; then
            echo "No changes to running.json"
          else
            git commit -m "chore: fetch running.json from Keep"
            git push
          fi
