name: Sync feeds

on:
  schedule:
    # 每 4 小时执行一次
    - cron: "0 */4 * * *"
  workflow_dispatch:

jobs:
  sync:
    name: build feeds.json
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run feeds-aggregator
        uses: chensoul/feeds-aggregator@main
        with:
          sources: public/data/rss.txt
          output: public/data/feeds.json

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet public/data/feeds.json || (
            git add public/data/feeds.json &&
            git commit -m "chore: sync feeds.json from RSS sources" &&
            git push
          )
